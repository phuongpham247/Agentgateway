## Kubernetes Gateway API CRDs - Required before AgentGateway
## Install with:
##   kubectl apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
##
## Note: v1.5.0 requires K8s 1.31+. Using v1.2.0 for compatibility with K8s 1.30.
## Note: Must use --server-side to avoid annotation size limits on large CRDs.
